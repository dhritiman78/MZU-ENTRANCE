                optionsHTML += `
                    <label id="label-${item.id}-${key}" class="flex items-center gap-3 p-3 rounded-lg border border-gray-100 hover:bg-gray-50 cursor-pointer transition text-sm font-medium">
                        <input type="radio" name="item-${item.id}" value="${key}" onclick="evaluateAnswer(${item.id}, '${key}', '${item.answer}')" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                        <span>(${key}) ${value}</span>
                    </label>
                `;
            }
            optionsHTML += `</div>`;

            optionsHTML += `
                <div id="feedback-${item.id}" class="hidden mt-4 p-3 rounded-lg text-sm font-semibold flex items-center justify-between">
                    <span id="feedback-text-${item.id}"></span>
                    <span class="bg-white px-2 py-0.5 rounded border shadow-sm text-xs font-mono text-gray-600">Correct key: (${item.answer})</span>
                </div>
            `;

            qCard.innerHTML = `
                <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Question ${index + 1}</span>
                <p class="font-bold text-gray-900 text-base mt-1">${item.q}</p>
                ${optionsHTML}
            `;

            sectionWrapper.appendChild(qCard);
        });

        function evaluateAnswer(questionId, selectedChoice, correctKey) {
            const isCorrect = selectedChoice === correctKey;
            internalUserAnswers[questionId] = isCorrect;

            const feedbackBox = document.getElementById(`feedback-${questionId}`);
            const feedbackText = document.getElementById(`feedback-text-${questionId}`);

            feedbackBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'bg-green-50', 'text-green-700');

            if (isCorrect) {
                feedbackBox.classList.add('bg-green-50', 'text-green-700');
                feedbackText.innerHTML = `✓ Correct choice!`;
            } else {
                feedbackBox.classList.add('bg-red-50', 'text-red-700');
                feedbackText.innerHTML = `✗ Incorrect choice.`;
            }

            ['A', 'B', 'C', 'D'].forEach(key => {
                const targetLabel = document.getElementById(`label-${questionId}-${key}`);
                targetLabel.classList.remove('bg-green-100', 'border-green-400', 'bg-red-100', 'border-red-400', 'opacity-60');

                if (key === correctKey) {
                    targetLabel.classList.add('bg-green-100', 'border-green-400');
                } else if (key === selectedChoice && !isCorrect) {
                    targetLabel.classList.add('bg-red-100', 'border-red-400');
                } else {
                    targetLabel.classList.add('opacity-60');
                }
            });

            recalculateMetrics();
        }

        function recalculateMetrics() {
            let correctCount = 0;
            let answeredCount = Object.keys(internalUserAnswers).length;

            for (const qId in internalUserAnswers) {
                if (internalUserAnswers[qId] === true) correctCount++;
            }

            document.getElementById('scoreTracker').innerText = correctCount;
            const percentage = Math.round((answeredCount / totalQuestions) * 100);
            document.getElementById('progressTracker').innerText = `${percentage}%`;
        }

        function scrollToSection(id) {
            const element = document.getElementById(id);
            if(element) element.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
